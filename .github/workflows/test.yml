name: Tests

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: node --test scripts/build.test.js scripts/commitlint.test.js scripts/panel-selection-keywords.test.js scripts/visual-vocabulary.test.js scripts/memory-guidance.test.js scripts/release-verify.test.js scripts/hooks.test.js scripts/gh-project-set-status.test.js scripts/detect-task-system.test.js scripts/issue-tracker-linear.test.js

      - name: Build templates
        run: npm run build

      - name: Run post-build tests (contracts + wiring)
        run: node --test scripts/contracts.test.js scripts/wu3-memory-wiring.test.js scripts/wu4-memory-wiring.test.js scripts/wu5-memory-wiring.test.js

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate Claude plugin
        run: claude plugin validate .

      - name: Run all tests with coverage
        run: node --test --experimental-test-coverage --test-coverage-lines=70 --test-coverage-branches=70 --test-coverage-functions=70 scripts/build.test.js scripts/commitlint.test.js scripts/panel-selection-keywords.test.js scripts/visual-vocabulary.test.js scripts/memory-guidance.test.js scripts/wu3-memory-wiring.test.js scripts/wu4-memory-wiring.test.js scripts/wu5-memory-wiring.test.js scripts/contracts.test.js scripts/release-verify.test.js scripts/hooks.test.js scripts/gh-project-set-status.test.js scripts/detect-task-system.test.js scripts/issue-tracker-linear.test.js
